<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peliculas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h1 class="mb-3">Cine Peliculas</h1>

        <div class="row g-2 mb-3">
            <div class="col-md-3">
                <input type="number" class="form-control" id="busquedaId" placeholder="Buscar por ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="buscarPorId()">Buscar ID</button>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filtroGenero">
                    <option value="Drama">Drama</option>
                    <option value="Romance">Romance</option>
                    <option value="Documentary">Documentary</option>
                    <option value="Horror">Horror</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Comedy">Comedy</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="filtrarPorGenero()">Filtrar genero</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="mostrarTodas()">Todas</button>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="busquedaNombre" placeholder="Buscar por nombre">
            </div>
            <div class="col-md-2">
                <button class="btn btn-info w-100 text-white" onclick="buscarPorNombre()">Buscar nombre</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-warning w-100" onclick="filtrarCalificacion()">Calificacion >= 5</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="aplicarMap()">Aplicar map</button>
            </div>
        </div>

        <div id="mensaje" class="alert alert-danger d-none"></div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Titulo</th>
                        <th>Genero</th>
                        <th>Calificacion</th>
                    </tr>
                </thead>
                <tbody id="tablaPeliculas"></tbody>
            </table>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</html>
